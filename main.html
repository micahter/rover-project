<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="CSS_TankGui.css" />
  <title>TankGUI</title>
</head>

<!-- BODY -->
<body>
  <header class="top-bar">
    <nav class="top-nav">
      <h4>LANDBOT</h4>
      <h4><a href="main.html" class="nave-link">MAIN</a></h4>
      <h4><a href="roarm.html" class="nave-link">ARM</a></h4>
      <h4><a href="imageClassifier.html" class="nave-link">Image Classifier</a></h4>
    </nav>
  </header>

  <main class="layout">
    <!-- LEFT SIDE STARTS-->
    <aside class="sidebar">
      <!-- CONNECTION -->
      <section class="card" id="card-connection">
        <div class="card-label">CONNECTION</div>
        <div class="field-row">
          <label class="field-tag">IP</label>
          <input type="text" id="ipAddress" placeholder="136.183.81.233"/>
        </div>
        <div class="field-row">
          <label class="field-tag">PORT</label>
          <input type="text" id="arduinoPort" placeholder="8765"/>
        </div>
        <button class="btn-primary" onclick="connect()">Connect</button>
        <p><span id="connectButton">No Connection</span></p>    <!-- NEED TO CHECK LATER -->
      </section>
      <!-- END OF CONNECTION -->

      <!-- Parallel_button -->
       <button class="btn-primary" onclick="parallel_button()">Parallel Parking</button>


      <!-- SPEED STARTS-->
       <section class="card" id="card-speed">
        <div class="card-label">SPEED</div>
        <div class="slider-group">
          <div class="slider-item"> <!-- MAX V SLIDER-->
            <div class="slider-header">
              <span class="slider-name">MAX V</span>
              <span class="slider-val"><span id="velocityValuetext">1.0</span> <em>m/s</em></span>
            </div>
            <input type="range" min="0" max="3" step="0.1" value="1" id="velocitySlider" oninput="updateVelocity()" />
          </div>
          <!-- END OF MAX V SLIDER-->


          <!-- MAX W SLIDER-->
          <div class="slider-item"> <!-- MAX W SLIDER-->
            <div class="slider-header">
              <span class="slider-name">MAX W</span>
              <span class="slider-val"><span id="turnValuetext">1.0</span> <em>m/s</em></span>
            </div>
            <input type="range" min="0" max="3" step="0.1" value="1" id="turnSlider" oninput="updateTurn()" />
          </div>
          <!-- END OF MAX W SLIDER-->
        </div>
       </section>

       <section class="card card-inline" id="card-auto">
        <div class="card-label">AUTOMODE</div>
        <label class="toggle-switch">
          <input type="checkbox" id="autoMode" onchange="toggleAutoMode()"/>
          <span class="switch-track">
            <span class="switch-thumb"></span>
          </span>
          <span class="switch-state" id="autoModeLabel">OFF</span>
        </label>
       </section>
    </aside>
    <!-- LEFT SIDE ENDS-->

    <!-- CENTER SIDE STARTS-->
    <div class="center-col">
      <section class="card card-camera">
        <div class="card-label">CAMERA // DISTANCE SENSOR</div>

        <div class="camera-sensors-row">
          
          <div class="camera-frame">
            <img id="footage-placeholder" src="camera-placeholder.png" alt="Live footage from camera">
          </div>

          <div class="sensors-group">
            <div class="barWrapper">
              <div class="barContainer">
                <div id="distanceBar1" class="barFill"></div>
                <div id="safeMarker1" class="safeMarker"></div>
              </div>
              <div id="distanceLabel1" class="distanceLabel">0 cm</div>
            </div>

            <div class="barWrapper">
              <div class="barContainer">
                <div id="distanceBar2" class="barFill"></div>
                <div id="safeMarker2" class="safeMarker"></div>
              </div>
              <div id="distanceLabel2" class="distanceLabel">0 cm</div>
            </div>

            <div class="barWrapper">
              <div class="barContainer">
                <div id="distanceBar3" class="barFill"></div>
                <div id="safeMarker3" class="safeMarker"></div>
              </div>
              <div id="distanceLabel3" class="distanceLabel">0 cm</div>
            </div>

          </div> 
        </div> 
      </section>

      <section class="card card-controls">
        <div class="card-label">DRIVE CONTROLS</div>
        <div class="controls-layout">
          <div class="wasd-wrap">
            <div class="wasd-row">
              <button class="key-btn" id="btnW">W</button>
            </div>
            <div class="wasd-row">
              <button class="key-btn" id="btnA">A</button>
              <button class="key-btn" id="btnS">S</button>
              <button class="key-btn" id="btnD">D</button>
            </div>
            <div class="move-display" id="moveDisplay">-</div>
            <p>
              <span id="wOutput" style="margin-right:50px;"></span>
              <span id="sOutput" style="margin-right:50px;"></span>
              <span id="aOutput" style="margin-right:50px;"></span>
              <span id="dOutput" style="margin-right:50px;"></span>
            </p>
          </div>

          <div class="action-col">
            <button class="btn-stop" onclick="stop()">
              <span id="stopOutput">STOP</span>
            </button>
            <button class="btn-quit" onclick="quit()">
              <span id="quitOutput">QUIT</span>
            </button>            
          </div>
        </div>
      </section>
    </div>
    <!-- CENTER SIDE ENDS-->


    <!-- RIGHT SIDE STARTS-->

    <aside class="sidebar sidebar-right">
      <section class="card card-turtle">
        <div class="turtle-header">
          <div class="card-label">PATH TRACKER</div>
          <!--  FOR PATH TRACKER CAN BE ADDED IN THIS PART  -->
        </div>
        <canvas id="turtleCanvas" width="260" height="320"></canvas>
      </section>
    </aside>
    <!-- RIGHT SIDE ENDS-->


  </main>

  <!-- SCRIPT -->
  <script>
    const BASE_URL = "http://127.0.0.1:8000";
    const UPDATE_HZ = 20;
    const UPDATE_MS = 1000 / UPDATE_HZ;

    let connected = false;
    let keys = new Set();
    let intervalId = null;

    // -------------------------------
    // CONNECTION
    // -------------------------------
    function connect() {
      let ip = document.getElementById("ipAddress").value;
      let port = document.getElementById("arduinoPort").value;
      
      document.getElementById("connectButton").innerText = "Connecting...";
      fetch(`${BASE_URL}/connect?ip=${ip}&port=${port}`)
        .then((r) => r.json())
        .then((data) => {
          document.getElementById("connectButton").innerText = data.message;
          connected = data.message.includes("Connected");
        })
        .catch((err) => {
          document.getElementById("connectButton").innerText = "Connection Failed";
          console.log(err);
        });
    }

    // -------------------------------
    // SLIDERS
    // -------------------------------
    function updateVelocity() {
      if (!connected) return;
      let v = document.getElementById("velocitySlider").value;
      document.getElementById("velocityValuetext").innerText = Number(v).toFixed(1);
      fetch(`${BASE_URL}/velocity?v=${v}`);
    }

    function updateTurn() {
      if (!connected) return;
      let w = document.getElementById("turnSlider").value;
      document.getElementById("turnValuetext").innerText = Number(w).toFixed(1);
      fetch(`${BASE_URL}/turn?w=${w}`);
    }

    // -------------------------------
    // SMOOTH KEYBOARD CONTROL (like old TankGUI)
    // -------------------------------
    document.addEventListener("keydown", (event) => {
      if (!connected) return;

      const key = event.key.toLowerCase();
      if (!["w", "a", "s", "d"].includes(key)) return;
      if (keys.has(key)) return;

      // Automode unable WASD
      if (document.getElementById("autoMode").checked) {
        document.getElementById("autoMode").checked = false;
        fetch(`${BASE_URL}/auto_off`);
      }

      keys.add(key);
      handleUI(key);

      if (!intervalId) {
        intervalId = setInterval(sendContinuousCommand, UPDATE_MS); //runs 20 times per second(UPDATE_HZ=20)
      }
    });

    document.addEventListener("keyup", (event) => {
      const key = event.key.toLowerCase();
      keys.delete(key);
      if (keys.size === 0 && intervalId) {
        clearInterval(intervalId);
        intervalId = null;
        stop();
        clearOutputs();
      }
    });

    function sendContinuousCommand() {
      if (!connected) return;
      let v = 0, w = 0;

      if (keys.has("w")) v += 1;
      if (keys.has("s")) v -= 1;
      if (keys.has("a")) w += 1;
      if (keys.has("d")) w -= 1;

      const maxV = parseFloat(document.getElementById("velocitySlider").value);
      const maxW = parseFloat(document.getElementById("turnSlider").value);

      v *= maxV;
      w *= maxW;

      const left = Math.max(-maxV, Math.min(maxV, v + w));
      const right = Math.max(-maxV, Math.min(maxV, v - w));

      fetch(`${BASE_URL}/velocity_drive?l=${left}&r=${right}`)
        .then((r) => r.json())
        .catch((err) => console.log("Drive error:", err));
    }

    function handleUI(key) {
      clearOutputs();
      flashButton(`btn${key.toUpperCase()}`);
      const keyMap = { w: "Forward", s: "Backward", a: "Left", d: "Right" };
      document.getElementById(`${key}Output`).innerText = keyMap[key];
    }

    // -------------------------------
    // BUTTON FUNCTIONS
    // -------------------------------
    function flashButton(id) {
      const btn = document.getElementById(id);
      btn.style.backgroundColor = "#ff94b2"; //Pink Color
      btn.style.color = "#2b0013"
      setTimeout(() => { btn.style.backgroundColor = ""; }, 120);
    }

    function clearOutputs() {
      ["wOutput", "aOutput", "sOutput", "dOutput", "stopOutput"].forEach(
        (id) => (document.getElementById(id).innerText = "")
      );
    }

    function stop() {
      if (!connected) return;
      fetch(`${BASE_URL}/stop`)
        .then((r) => r.json())
        .then((d) => {
          document.getElementById("stopOutput").innerText = d.message;
        })
        .catch((err) => console.log(err));
    }

  function toggleAutoMode() {
    const autoCheckbox = document.getElementById("autoMode");
    const label = document.getElementById("autoModeLabel");
    let isOn = autoCheckbox.checked;

    if (isOn) {
      label.innerText = "ON";
      label.style.color = "#ae0849"; 
      fetch(`${BASE_URL}/auto_on`)
        .catch(err => console.error("Error al activar auto:", err));
    } else {
      label.innerText = "OFF";
      label.style.color = ""; 
      fetch(`${BASE_URL}/auto_off`)
        .catch(err => console.error("Error al desactivar auto:", err));
    }
  }


    function quit() {
      if (!connected) return;
      fetch(`${BASE_URL}/quit`)
        .then((r) => r.json())
        .then((data) => {
          document.getElementById("quitOutput").innerText = data.message;
          document.getElementById("connectButton").innerText = "Disconnected";
          connected = false;
          keys.clear();
          clearOutputs();
        })
        .catch((err) => console.log(err));
    }

    function parallel_button() {
    if (!connected) return;

    fetch(`${BASE_URL}/parallel_button`)
        .then((r) => r.json())
        .then((data) => {
            // Display the message (e.g., "Starting autonomous parking")
            document.getElementById("stopOutput").innerText = data.message;
            
            // REMOVED: connected = false; 
            // Keep it true so you can still hit "STOP" if something goes wrong!
        })
        .catch((err) => console.log("Parallel Parking Error:", err));
  }

    // let is used to create a variable- a box in memory where
    // you store a value that can change
    let count1 = []
    let count2 = []
    let count3 = []

    //let count1 = 0, total1 = 0;
    //let count2 = 0, total2 = 0;

    setInterval(() => {
      if (!connected) return;

      fetch(`${BASE_URL}/distance`)
        .then(r => r.json())
        .then(data => {

          const d1 = Number(data.d1);   //"cons" means this variable cannot be reassigned
          const d2 = Number(data.d2);
          const d3 = Number(data.d3)
          if(count1.length<10){
            count1.push(d1)
            count2.push(d2)
            count3.push(d3)
          }
          else{
            count1.shift()
            count1.push(d1)
            count2.shift()
            count2.push(d2)
            count3.shift()
            count3.push(d3)
          }
          const total1=count1.reduce(
            (accumulator,currentValue)=>accumulator+ currentValue,0);
          const total2=count2.reduce(
            (accumulator,currentValue)=>accumulator+ currentValue,0);
          const total3=count3.reduce(
            (accumulator,currentValue)=>accumulator+ currentValue,0);
          const avg1=total1/count1.length;
          const avg2=total2/count2.length; 
          const avg3=total3/count3.length;
          //Every time we get a distance reading, add it to the total 
          //When we have 4 readings, compute the average

         
          // Update bars 
          updateVerticalBar(avg1, "distanceBar1", "safeMarker1", "distanceLabel1");
          updateVerticalBar(avg2, "distanceBar2", "safeMarker2", "distanceLabel2");
          updateVerticalBar(avg3, "distanceBar3", "safeMarker3", "distanceLabel3");

          
        })
        .catch(err => console.log("Fetch error:", err));
    }, 300);


    // Helper to update bar height + color + label
    function updateVerticalBar(distance, barId, markerId, labelId) {
      const maxRange = 100; // max cm for full bar

      // Convert distance to percentage height
      let percent = Math.min(100, (distance / maxRange) * 100);

      const bar = document.getElementById(barId);
      bar.style.height = percent + "%";

      // Color logic
      if (distance < 30) bar.style.background = "red";
      else if (distance < 60) bar.style.background = "yellow";
      else bar.style.background = "green";

      // Safe marker at 20 cm
      const safe = document.getElementById(markerId);
      safe.style.bottom = (20 / maxRange) * 100 + "%";

      // Update label with ONLY the average
      document.getElementById(labelId).innerText = `${distance.toFixed(2)} cm`;
    }


    // --- PATH TRACKER LOGIC ---
    const canvas = document.getElementById('turtleCanvas');
    const ctx = canvas.getContext('2d');

    // Initial robot state
    let robotPos = { x: canvas.width / 2, y: canvas.height / 2, angle: -Math.PI / 2 }; 

    function drawPath(commands) {
      const canvas = document.getElementById('turtleCanvas');
      const ctx = canvas.getContext('2d');
      
      // 1. Clear and setup style
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.beginPath();
      ctx.strokeStyle = "#ae0849"; 
      ctx.lineWidth = 3;
      ctx.lineCap = "round";

      // 2. Start from center
      let x = canvas.width / 2;
      let y = canvas.height / 2;
      let angle = -Math.PI / 2; // Face "up" initially

      // 3. Constants for scaling (Adjust these to fit your robot's scale)
      const trackWidth = 10; // Distance between wheels in "canvas pixels"
      const stepSize = 0.5;   // How much the robot moves per history entry

      ctx.moveTo(x, y);

      commands.forEach(cmd => {
          const parts = cmd.split(' ');
          if (parts[0] === 'V' && parts.length === 3) {
              const left = parseFloat(parts[1]);
              const right = parseFloat(parts[2]);

              // Differential Kinematics
              const linearVel = (left + right) / 2;
              const angularVel = (right - left) / trackWidth;

              // Update pose
              angle += angularVel; 
              x += Math.cos(angle) * linearVel * stepSize;
              y += Math.sin(angle) * linearVel * stepSize;

              ctx.lineTo(x, y);
        }
    });
    ctx.stroke();

    // 4. Draw a small triangle at the current position to represent the robot
    ctx.fillStyle = "#ff94b2";
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();
}

    // Function to refresh history every second
    setInterval(() => {
        if (!connected) return;
        fetch(`${BASE_URL}/history`)
            .then(r => r.json())
            .then(data => {
                if (data.commands) drawPath(data.commands);
            })
            .catch(err => console.error("Path tracker error:", err));
    }, 1000);


  </script>
</body>
</html>
