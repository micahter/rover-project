<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="CSS_TankGui.css" />
  <title>TankGUI</title>
</head>

<body>
  <h3>--Connection---</h3>
  IP: <input type="text" id="ipAddress" />
  Port: <input type="text" id="arduinoPort" />
  <button onclick="connect()">Connect</button>
  <p><span id="connectButton">No Connection</span></p>

  <h3>--Speed-----------</h3>
  <label>Max V (m/s):</label>
  <input type="range" min="0" max="3" step="0.1" value="1"
         id="velocitySlider" oninput="updateVelocity()" />
  <p>Velocity: <span id="velocityValuetext">1</span></p>

  <label>Max W (rad/s):</label>
  <input type="range" min="0" max="3" step="0.1" value="1"
         id="turnSlider" oninput="updateTurn()" />
  <p>Turn Strength: <span id="turnValuetext">1</span></p>

  <h3>--Control Keys--</h3>
  <div class="controls">
    <div class="column">
      <button class="button1" id="btnW" onclick="forward()">W</button>
    </div>
    <div class="row">
      <button class="button1" id="btnA" onclick="left()">A</button>
      <button class="button1" id="btnS" onclick="backward()">S</button>
      <button class="button1" id="btnD" onclick="right()">D</button>
    </div>
  </div>

  <p>
    <span id="wOutput" style="margin-right:50px;"></span>
    <span id="sOutput" style="margin-right:50px;"></span>
    <span id="aOutput" style="margin-right:50px;"></span>
    <span id="dOutput" style="margin-right:50px;"></span>
  </p>

  <button id="stopButton" onclick="stop()">Stop</button>
  <span id="stopOutput" style="margin-left: 10px;"></span>

  <br><br>
  <input type="checkbox" id="autoMode" onchange="toggleAutoMode()">Auto Mode
  <button onclick="quit()">Quit</button>
  <span id="quitOutput" style="margin-left: 10px;"></span>

  <h3>--Arduino Telemetry------</h3>
  <input type="text" id="distanceBox" readonly />

  <h3>--Distance Sensor------</h3>
  <input type="text" value="Just Print Values" readonly />

  <script>
    const BASE_URL = "http://127.0.0.1:8000";
    const UPDATE_HZ = 20;
    const UPDATE_MS = 1000 / UPDATE_HZ;

    let connected = false;
    let keys = new Set();
    let intervalId = null;

    // -------------------------------
    // CONNECTION
    // -------------------------------
    function connect() {
      let ip = document.getElementById("ipAddress").value;
      let port = document.getElementById("arduinoPort").value;
      
      document.getElementById("connectButton").innerText = "Connecting...";
      fetch(`${BASE_URL}/connect?ip=${ip}&port=${port}`)
        .then((r) => r.json())
        .then((data) => {
          document.getElementById("connectButton").innerText = data.message;
          connected = data.message.includes("Connected");
        })
        .catch((err) => {
          document.getElementById("connectButton").innerText = "Connection Failed";
          console.log(err);
        });
    }

    // -------------------------------
    // SLIDERS
    // -------------------------------
    function updateVelocity() {
      if (!connected) return;
      let v = document.getElementById("velocitySlider").value;
      document.getElementById("velocityValuetext").innerText = Number(v).toFixed(1);
      fetch(`${BASE_URL}/velocity?v=${v}`);
    }

    function updateTurn() {
      if (!connected) return;
      let w = document.getElementById("turnSlider").value;
      document.getElementById("turnValuetext").innerText = Number(w).toFixed(1);
      fetch(`${BASE_URL}/turn?w=${w}`);
    }

    // -------------------------------
    // SMOOTH KEYBOARD CONTROL (like old TankGUI)
    // -------------------------------
    document.addEventListener("keydown", (event) => {
      if (!connected) return;

      const key = event.key.toLowerCase();
      if (!["w", "a", "s", "d"].includes(key)) return;
      if (keys.has(key)) return;

      // Automode unable WASD
      if (document.getElementById("autoMode").checked) {
        document.getElementById("autoMode").checked = false;
        fetch(`${BASE_URL}/auto_off`);
      }

      keys.add(key);
      handleUI(key);

      if (!intervalId) {
        intervalId = setInterval(sendContinuousCommand, UPDATE_MS);
      }
    });

    document.addEventListener("keyup", (event) => {
      const key = event.key.toLowerCase();
      keys.delete(key);
      if (keys.size === 0 && intervalId) {
        clearInterval(intervalId);
        intervalId = null;
        stop();
        clearOutputs();
      }
    });

    function sendContinuousCommand() {
      if (!connected) return;
      let v = 0, w = 0;

      if (keys.has("w")) v += 1;
      if (keys.has("s")) v -= 1;
      if (keys.has("a")) w += 1;
      if (keys.has("d")) w -= 1;

      const maxV = parseFloat(document.getElementById("velocitySlider").value);
      const maxW = parseFloat(document.getElementById("turnSlider").value);

      v *= maxV;
      w *= maxW;

      const left = Math.max(-maxV, Math.min(maxV, v + w));
      const right = Math.max(-maxV, Math.min(maxV, v - w));

      fetch(`${BASE_URL}/velocity_drive?l=${left}&r=${right}`)
        .then((r) => r.json())
        .catch((err) => console.log("Drive error:", err));
    }

    function handleUI(key) {
      clearOutputs();
      flashButton(`btn${key.toUpperCase()}`);
      const keyMap = { w: "Forward", s: "Backward", a: "Left", d: "Right" };
      document.getElementById(`${key}Output`).innerText = keyMap[key];
    }

    // -------------------------------
    // BUTTON FUNCTIONS
    // -------------------------------
    function flashButton(id) {
      const btn = document.getElementById(id);
      btn.style.backgroundColor = "yellow";
      setTimeout(() => { btn.style.backgroundColor = ""; }, 120);
    }

    function clearOutputs() {
      ["wOutput", "aOutput", "sOutput", "dOutput", "stopOutput"].forEach(
        (id) => (document.getElementById(id).innerText = "")
      );
    }

    function stop() {
      if (!connected) return;
      fetch(`${BASE_URL}/stop`)
        .then((r) => r.json())
        .then((d) => {
          document.getElementById("stopOutput").innerText = d.message;
        })
        .catch((err) => console.log(err));
    }

    function toggleAutoMode() {
      let isOn = document.getElementById("autoMode").checked;
      if (isOn){
        fetch(`${BASE_URL}/auto_on`);
      } else {
        fetch(`${BASE_URL}/auto_off`);
      }
    }


    function quit() {
      if (!connected) return;
      fetch(`${BASE_URL}/quit`)
        .then((r) => r.json())
        .then((data) => {
          document.getElementById("quitOutput").innerText = data.message;
          document.getElementById("connectButton").innerText = "Disconnected";
          connected = false;
          keys.clear();
          clearOutputs();
        })
        .catch((err) => console.log(err));
    }

    // -------------------------------
    // DISTANCE SENSOR POLLING
    // -------------------------------
    setInterval(() => {
      if (!connected) return;
      fetch(`${BASE_URL}/distance`)
        .then((r) => r.json())
        .then((data) => {
          document.getElementById("distanceBox").value = data.distance;
        })
        .catch(() => {});
    }, 300);
  </script>
</body>
</html>
