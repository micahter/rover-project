<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>TankGUI</title>
    
</head>
<body>
    <h3>--Connection---</h3>
    IP: <input type="text" id="ipAddress">
    Port: <input type="text" id="arduinoPort">
    <button onclick="connect()">Connect</button>
    <p><span id="connectButton">No Connection</span></p>

    <h3>--Speed-----------</h3>
    <!-- Speed Slider -->
    <label>Max V (m/s):</label>
    <input type="range" min="0" max="3" step="0.1" 
    value="1" id="velocitySlider" 
    oninput="updateVelocity()"> 
    <p>Velocity: <span id="velocityValuetext">1</span></p>

    <!-- <br><label>Max W (m/s):</label> 
    <input type="range" id="max_w" min="0" max="6"> -->

    <h3>--Control Keys--</h3>
    <div class="controls">   <!-- Starts Controls  -->
        <div class="column">    
            <button class="button">W</button>
        </div>
        <div class="row">   <!-- Starts ROWS  -->
            <button class="button">A</button>
            <button class="button">S</button>
            <button class="button">D</button>
        </div>  <!-- End ROWS  -->
    </div> <!-- Ends Controls  -->
    <!-- End of Buttons-->

    <br>

    <button onclick="Stop()">Stop</button>
    <!-- Output for Stop button -->
    <span id="stopOutput" style="margin-left: 10px;"></span>

    <br><br>
    <input type="checkbox"  id="autoMode" name="Auto">Auto
    <button onclick="Quit()" id="quitButton">Quit</button>
    <span id="quitOutput" style="margin-left: 10px;"></span>


    <h3>--Arduino Telemetry------</h3>
    <!-- Here is for print Arduino 
     similar to what we had on the previous GUI-->
     <input type="text" value="Just Print Values" class="readonly" readonly>
    


    <h3>--Distance Sensor------</h3>
    <!-- Here is for print Sensor 
     similar to what we had on the previous GUI-->
    <input type="text" value="Just Print Values" class="readonly" readonly>

    <script>
        function connect() {

            let ip = document.getElementById("ipAddress").value;
            let port = document.getElementById("arduinoPort").value;

            document.getElementById("connectButton").innerText = "Connecting...";
            fetch(`http://127.0.0.1:8000/connect?ip=${ip}&port=${port}`)
            .then(response => response.json())
            .then(data => {
                document.getElementById("connectButton").innerText = data.message;
                console.log(data.message);
            })
            .catch(error => {
                document.getElementById("connectButton").innerText = "Connection Failed";
                console.log(error);
            })
        }

        function updateVelocity() {
            let v = document.getElementById("velocitySlider").value;
            document.getElementById("velocityValuetext").innerText = Number(v).toFixed(1);
            fetch(`http://127.0.0.1:8000/velocity?v=${v}`)
            .then(response => response.json())
            .then(data => {
                console.log(data.message);
            })
        }

        function Stop(){
            fetch("http://127.0.0.1:8000/Stop")
            .then(response => response.json())
            .then(data => {
                document.getElementById("stopOutput").innerText = data.message;
            })
            .catch(error => {
                document.getElementById("stopOutput").innerText = "Failed to Stop";
                console.log(error);
            })

        function Quit(){
            fetch("http://127.0.0.1:8000/Quit")
            .then(response => response.json())
            .then(data => {
                document.getElementById("quitOutput").innerText = data.message;
            })
            .catch(error => {
                document.getElementById("quitOutput").innerText = "Failed to Quit";
                console.log(error);
            })

        }

        }
    </script>


</body>
</html>
