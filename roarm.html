<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS_TankGui.css" />
    <title>Ro Arm</title>
</head>

<body>
    <header class="top-bar">
        <nav class="top-nav">
            <h4>LANDBOT</h4>
            <h4><a href="main.html" class="nave-link">MAIN</a></h4>
            <h4><a href="roarm.html" class="nave-link">ARM</a></h4>
            <h4><a href="imageClassifier.html" class="nave-link">Image Classifier</a></h4>
        </nav>
    </header>
    <!-- Left Side-->
    <main class="layout2">
        <section class="cardA" id="card-righ                                                                                                                                       ttools">
            <div class="cardA-label">Cleaner Tool 1</div>
            <button class="cleaners-btn" onclick="runArm('clean.json')">Clean</button>
            <button class="cleaners-btn" onclick="runArm('grabto.json')">Grab Tool</button>
            <button class="cleaners-btn" onclick="runArm('switch.json')">Switch Tool</button>
            <button class="cleaners-btn" onclick="runArm('dropto.json')">Drop Tool</button>
            <div id="status">Waiting commands...</div>
        </section>

        <!-- RIGHT SIDE-->
        <!-- Change the files!!! -->
        
        <section class="cardA" id="card-lefttools">
            <div class="cardA-label">Cleaner Tool 2</div>
            <button class="cleaners-btn" onclick="runArm('clean.json')">Clean</button>
            <button class="cleaners-btn" onclick="runArm('grabto2.json')">Grab Tool</button>
            <button class="cleaners-btn" onclick="runArm('switchto2.json')">Switch Tool</button>
            <button class="cleaners-btn" onclick="runArm('dropto2.json')">Drop Tool</button>
            <div id="status">Waiting commands...</div>
        </section>

    </main>
  
    
    <button class="cleaners-btn" onclick="runArm('testcon.json')">TESTER</button>
    <p>This option is to make sure our arm is connected</p>
    
    <div id="status">Waiting commands...</div>
    <script>
        async function runArm(fileName) {
            const statusDiv = document.getElementById('status');
            statusDiv.style.color = "orange";
            statusDiv.innerText = `Executing, WAIT: ${fileName}...`;

            try {
                const response = await fetch(`http://127.0.0.1:8000/arm/execute/${fileName}`);
                const data = await response.json();
                if (data.status == "Success"){
                    statusDiv.style.color = "green";
                    statusDiv.innerText = `Successful ${fileName} working. \nOutput: ${data.output}`;
                } else{
                    statusDiv.style.color = "red";
                    statusDiv.innerText = `Error: ${data.details}`;
                }
            } catch (error){
                statusDiv.style.color = "red";
                statusDiv.innerText = `Connection Error, Try Again`;
                console.error("Error:", error);
            }
        }
    </script>
</body>

</html>
