<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS_TankGui.css" />
    <title>Image Classifier</title>
</head>


<body>
    <nav id="bar">
        <a href="main.html">MAIN</a>
    </nav>

    <div id="image and video upload" class ="largeContainer">

        <div id="image_drop" class="container">
            <h2 class ="first">Insert Image</h2>

            <label for="img">Select image:</label>
            <input type="file" id="img" name="file" accept="image/*" onchange="loadFile(event)">

            <button id="uploadButton" class="cleaners-btn" type="button" onclick="upload()">Upload</button>

            <img class= "second" id="output" width="200"/>

            <h3>Result:</h3>
            <h3 id="outputText"></h3>
        </div>



        <div id="video_Drop" class="Container">
            <h2>Drop video here</h2>
            <input type="file" name="file" id="video-input" accept="video/*" onchange="loadVid(event)">
            <button id="videoUploadButton" class="cleaners-btn" type="button" onclick="uploadVid()">Upload video</button>
            <div id="videoImageContainer">
                <img id="videoOutput" width="400">
                <div id="videoResult"></div>
            </div>

        </div>
    </div>



    <script>
        // preview image
        function loadFile(event) {
            const image = document.getElementById('output');
            image.src = URL.createObjectURL(event.target.files[0]);
        }
        // function loadVid(event) {
        //     const file = event.target.files[0];
        //     if (file) {
        //         const video = document.getElementById('videoOutput');
        //         video.src = URL.createObjectURL(file);
        //         video.load();
        //         video.play();
        //     }
        // }
        // upload + get result
        async function upload() {
            const fileInput = document.getElementById("img");

            if (!fileInput.files.length) {
                alert("Please select a file first");
                return;
            }

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            const response = await fetch("http://127.0.0.1:8000/upload", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            document.getElementById("outputText").innerText = data.result;
        }


        async function uploadVid() {
            const input = document.getElementById('video-input');

            const formData2 = new FormData();
            formData2.append("file", input.files[0]);

            const res = await fetch("http://127.0.0.1:8000/uploadVid", {
                method: "POST",
                body: formData2
            });

            const data = await res.json();

            startStream(data.filename);
        }
        
        function startStream(filename) {
            const socket = new WebSocket(`ws://127.0.0.1:8000/ws/video/${filename}`);

            socket.onmessage = function(event) {
                const data = JSON.parse(event.data);
                if(data.error){
                    console.error(data.error);
                    return;
                }

        // Convert hex → image
            const bytes = new Uint8Array(
                data.image.match(/.{1,2}/g).map(b => parseInt(b, 16))
            );

            const blob = new Blob([bytes], { type: "image/jpeg" });
            const url = URL.createObjectURL(blob);

            document.getElementById("videoOutput").src = url;
            if(data.label=="clean"){
                document.getElementById("videoImageContainer").style.borderColor = "green";
            }else if(data.label=="dirty"){
                document.getElementById("videoImageContainer").style.borderColor = "red";

            }else{
                document.getElementById("videoImageContainer").style.borderColor = "gray";

            }
            document.getElementById("videoResult").innerText=
            `Frame ${data.frame}: ${data.label} (${data.confidence}%)`;
            // console.log(
            //     `Frame ${data.frame}: ${data.label} (${data.confidence}%)`
            // );
    };
}

        
    </script>
</body>
</html>
